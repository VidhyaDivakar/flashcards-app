<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards App</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <div class="header-container">
            <h1>Flashcards App</h1>
            <nav aria-label="Primary navigation">
                <ul class="nav-links">
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Decks</a></li>
                    <li><a href="#">Study</a></li>
                    <li><a href="#">Create</a></li>
                    <li><a href="#">Progress</a></li>
                    <li><a href="#">Settings</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <aside id="sidebar">
        <h2>Decks</h2>
        <ul>
            <li><button type="button">Deck 1</button></li>
            <li><button type="button">Deck 2</button></li>
            <li><button type="button">Deck 3</button></li>
        </ul>
    </aside>
    <main id="main">
        <div class="card">
            <h3>Flashcard</h3>
            <p><strong>Question:</strong> What is the capital of France?</p>
            <p><strong>Answer:</strong> Paris</p>
            <div class="card-actions">
                <button type="button">Flip</button>
                <button type="button">Next</button>
            </div>
        </div>
    </main>
    <footer>
        <p>&copy; 2023 Flashcards App</p>
    </footer>
    <script src="app.js"></script>
</body>

</html>
